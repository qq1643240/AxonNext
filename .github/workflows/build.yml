name: Build AxonNext

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  THEOS: /opt/theos

jobs:
  build:
    name: Build (${{ matrix.scheme }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scheme: [rootless, roothide]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential fakeroot dpkg-dev perl \
            rsync curl wget git unzip xz-utils

      - name: Install ldid
        run: |
          curl -sL https://github.com/ProcursusTeam/ldid/releases/latest/download/ldid_linux_x86_64 -o /tmp/ldid
          sudo install -m755 /tmp/ldid /usr/local/bin/ldid

      - name: Install Theos with toolchain (rootless)
        if: matrix.scheme == 'rootless'
        run: |
          sudo mkdir -p /opt/theos
          sudo chown -R $USER /opt/theos
          # Clone Theos
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          # Install toolchain
          mkdir -p /opt/theos/toolchain/linux/iphone
          curl -sL "https://github.com/theos/toolchain/releases/latest/download/toolchain_linux_x86_64.tar.xz" -o /tmp/toolchain.tar.xz
          tar -xf /tmp/toolchain.tar.xz -C /opt/theos/toolchain/linux/iphone
          # Install ldid into toolchain
          cp /usr/local/bin/ldid /opt/theos/toolchain/linux/iphone/bin/ldid 2>/dev/null || true
          # Install SDK
          mkdir -p /opt/theos/sdks
          curl -sL "https://github.com/theos/sdks/raw/master/iPhoneOS16.5.sdk.tar.xz" -o /tmp/sdk.tar.xz
          tar -xf /tmp/sdk.tar.xz -C /opt/theos/sdks
          echo "=== Theos tree ==="
          ls /opt/theos/toolchain/linux/iphone/bin/ | head -10
          ls /opt/theos/sdks/

      - name: Install Theos with toolchain (roothide)
        if: matrix.scheme == 'roothide'
        run: |
          sudo mkdir -p /opt/theos
          sudo chown -R $USER /opt/theos
          # Clone roothide Theos fork
          git clone --recursive https://github.com/roothide/Theos.git /opt/theos
          # Install toolchain
          mkdir -p /opt/theos/toolchain/linux/iphone
          curl -sL "https://github.com/theos/toolchain/releases/latest/download/toolchain_linux_x86_64.tar.xz" -o /tmp/toolchain.tar.xz
          tar -xf /tmp/toolchain.tar.xz -C /opt/theos/toolchain/linux/iphone
          cp /usr/local/bin/ldid /opt/theos/toolchain/linux/iphone/bin/ldid 2>/dev/null || true
          # Install SDK
          mkdir -p /opt/theos/sdks
          curl -sL "https://github.com/theos/sdks/raw/master/iPhoneOS16.5.sdk.tar.xz" -o /tmp/sdk.tar.xz
          tar -xf /tmp/sdk.tar.xz -C /opt/theos/sdks
          echo "=== Theos tree ==="
          ls /opt/theos/toolchain/linux/iphone/bin/ | head -10
          ls /opt/theos/sdks/

      - name: Build Tweak
        run: |
          cd ${{ github.workspace }}
          make clean || true
          make package THEOS_PACKAGE_SCHEME=${{ matrix.scheme }} FINALPACKAGE=1 2>&1 || {
            echo "=== Build failed, retrying with verbose ==="
            make package THEOS_PACKAGE_SCHEME=${{ matrix.scheme }} FINALPACKAGE=1 VERBOSE=1
          }

      - name: List built packages
        run: |
          find . -name "*.deb" -type f
          ls -la packages/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AxonNext-${{ matrix.scheme }}
          path: |
            **/*.deb
            packages/*.deb

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name "*.deb" -exec cp {} release/ \;
          # Rename for clarity
          cd release
          for f in *.deb; do
            if [ -f "$f" ]; then
              mv "$f" "AxonNext_$(echo $f | sed 's/\.deb//' | tr '[:upper:]' '[:lower:]').deb" 2>/dev/null || true
            fi
          done
          ls -la release/ 2>/dev/null || ls -la

      - name: Delete existing release
        run: |
          gh release delete v2.0 --yes 2>/dev/null || true
          git push --delete origin v2.0 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0
          name: AxonNext v2.0
          body: |
            # AxonNext v2.0

            ## 支持的越狱环境
            - Dopamine Rootless (iOS 14-16.5)
            - RootHide Bootstrap (iOS 14-16.5)
            - palera1n Rootless (iOS 14-16.5)

            ## 安装包
            - `AxonNext_rootless.deb` - Rootless 版本
            - `AxonNext_roothide.deb` - Roothide 版本

            ## 功能特性
            - 四方向手势（上滑/下滑/左滑/右滑）
            - 长按菜单（打开应用/查看通知/清除/收藏/复制等）
            - 全中文设置界面
            - 黑白名单过滤
            - 自定义布局（图标大小/间距/每行数量/圆角）
            - 6种动画效果
            - 通知角标
            - 深色/浅色/毛玻璃/透明外观
          files: |
            release/*.deb
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
