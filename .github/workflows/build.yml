name: Build AxonNext

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.scheme }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        scheme: [rootless, roothide]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Theos
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git curl wget perl clang lld llvm \
            libxml2-dev libssl-dev zlib1g-dev dpkg-dev unzip xz-utils \
            libbz2-dev liblzma-dev fakeroot rsync sed grep lzma-dev
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          
      - name: Install iOS SDK
        run: |
          set -e
          cd $THEOS/sdks
          echo "Current SDKs:"
          ls -la
          if [ -z "$(ls -A *.sdk 2>/dev/null)" ]; then
            echo "No SDKs found, cloning..."
            git clone --depth 1 https://github.com/theos/sdks.git tmp_sdks
            mv tmp_sdks/*.sdk .
            rm -rf tmp_sdks
          fi
          echo "Final SDKs:"
          ls -la

      - name: Build Package (${{ matrix.scheme }})
        run: |
          echo "THEOS=$THEOS"
          ls -la $THEOS/
          make clean THEOS="$THEOS" || true
          THEOS_PACKAGE_SCHEME=rootless make package FINALPACKAGE=1 THEOS="$THEOS" 2>&1 | tee build-${{ matrix.scheme }}.log
          echo "=== Finding all deb files ==="
          find . -name "*.deb" -type f 2>/dev/null
          mkdir -p output-${{ matrix.scheme }}
          find . -name "*.deb" -type f -exec cp {} output-${{ matrix.scheme }}/ \;
          ls -la output-${{ matrix.scheme }}/

      - name: Print build log on failure
        if: always()
        run: |
          echo "## Build Log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat build-${{ matrix.scheme }}.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ matrix.scheme }}
          path: build-${{ matrix.scheme }}.log

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AxonNext-${{ matrix.scheme }}-deb
          path: |
            output-${{ matrix.scheme }}/*.deb

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name "*.deb" -exec cp {} release/ \;
          # Rename for clarity
          cd release
          for f in *.deb; do
            if [ -f "$f" ]; then
              mv "$f" "AxonNext_${f}" 2>/dev/null || true
            fi
          done
          # Simpler: just copy with scheme names
          find ../artifacts -name "*.deb" | while read f; do
            dir=$(dirname "$f")
            scheme=$(basename "$dir")
            cp "$f" "AxonNext_${scheme}.deb" 2>/dev/null || true
          done
          ls -la

      - name: Delete existing release
        run: |
          gh release delete v2.0 2>/dev/null || true
          git push --delete origin v2.0 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0
          name: AxonNext v2.0
          body: |
            # AxonNext v2.0

            ## 支持的越狱环境
            - Dopamine Rootless (iOS 14-16.5)
            - RootHide Bootstrap (iOS 14-16.5)
            - palera1n Rootless (iOS 14-16.5)

            ## 安装包
            - `AxonNext_rootless-deb/*.deb` - Rootless 版本
            - `AxonNext_roothide-deb/*.deb` - Roothide 版本

            ## 功能特性
            - 四方向手势（上滑/下滑/左滑/右滑）
            - 长按菜单（打开应用/查看通知/清除/收藏/复制等）
            - 全中文设置界面
            - 黑白名单过滤
            - 自定义布局（图标大小/间距/每行数量/圆角）
            - 6种动画效果
            - 通知角标
            - 深色/浅色/毛玻璃/透明外观
          files: |
            release/*.deb
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
