name: Build AxonNext

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  THEOS: /opt/theos

jobs:
  build:
    name: Build (${{ matrix.scheme }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scheme: [rootless, roothide]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential fakeroot dpkg-dev perl \
            rsync curl wget git unzip
          # Install ldid from ProcursusTeam (not in Ubuntu 24.04 repos)
          curl -sL https://github.com/ProcursusTeam/ldid/releases/latest/download/ldid_linux_x86_64 -o /tmp/ldid
          sudo install -m755 /tmp/ldid /usr/local/bin/ldid
          ldid 2>&1 || true

      - name: Cache Theos (${{ matrix.scheme }})
        uses: actions/cache@v4
        id: cache-theos
        with:
          path: /opt/theos
          key: theos-${{ matrix.scheme }}-v3-sdk

      - name: Install Theos (rootless)
        if: steps.cache-theos.outputs.cache-hit != 'true' && matrix.scheme == 'rootless'
        run: |
          sudo mkdir -p /opt/theos
          sudo chown -R $USER /opt/theos
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          mkdir -p /opt/theos/toolchain/linux/iphone
          cp /usr/local/bin/ldid /opt/theos/toolchain/linux/iphone/ldid
          # Download iOS SDK
          cd /tmp
          curl -sL "https://github.com/chrjguill/iOS-SDKs/raw/master/iPhoneOS16.5.sdk.tar.xz" -o iPhoneOS16.5.sdk.tar.xz
          mkdir -p /opt/theos/sdks
          tar -xf iPhoneOS16.5.sdk.tar.xz -C /opt/theos/sdks
          ls /opt/theos/sdks/

      - name: Install Theos (roothide)
        if: steps.cache-theos.outputs.cache-hit != 'true' && matrix.scheme == 'roothide'
        run: |
          sudo mkdir -p /opt/theos
          sudo chown -R $USER /opt/theos
          # Use roothide fork which supports THEOS_PACKAGE_SCHEME=roothide
          git clone --recursive https://github.com/roothide/Theos.git /opt/theos
          mkdir -p /opt/theos/toolchain/linux/iphone
          cp /usr/local/bin/ldid /opt/theos/toolchain/linux/iphone/ldid
          # Download iOS SDK
          cd /tmp
          curl -sL "https://github.com/chrjguill/iOS-SDKs/raw/master/iPhoneOS16.5.sdk.tar.xz" -o iPhoneOS16.5.sdk.tar.xz
          mkdir -p /opt/theos/sdks
          tar -xf iPhoneOS16.5.sdk.tar.xz -C /opt/theos/sdks
          ls /opt/theos/sdks/

      - name: Setup Theos environment
        run: |
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          echo "THEOS_PACKAGE_SCHEME=${{ matrix.scheme }}" >> $GITHUB_ENV
          ls -la /opt/theos/makefiles/ | head -20
          # Verify the scheme exists
          grep -r "roothide\|rootless" /opt/theos/makefiles/common.mk || true

      - name: Build Tweak
        run: |
          cd ${{ github.workspace }}
          make clean || true
          make package THEOS_PACKAGE_SCHEME=${{ matrix.scheme }} FINALPACKAGE=1 2>&1 || {
            echo "=== Build failed, retrying with verbose ==="
            make package THEOS_PACKAGE_SCHEME=${{ matrix.scheme }} FINALPACKAGE=1 VERBOSE=1
          }

      - name: List built packages
        run: |
          echo "=== Built packages ==="
          ls -la packages/ || echo "No packages directory found"
          find . -name "*.deb" -type f

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AxonNext-${{ matrix.scheme }}
          path: |
            packages/*.deb
          if-no-files-found: warn

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f
          mkdir -p release
          cp artifacts/AxonNext-rootless/*.deb release/AxonNext_rootless.deb 2>/dev/null || echo "rootless deb not found"
          cp artifacts/AxonNext-roothide/*.deb release/AxonNext_roothide.deb 2>/dev/null || echo "roothide deb not found"
          ls -la release/

      - name: Delete previous release
        run: |
          # Delete existing v2.0 release if any
          gh release delete v2.0 --yes 2>/dev/null || true
          git push --delete origin v2.0 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0
          name: AxonNext v2.0
          body: |
            # AxonNext v2.0

            ## 支持的越狱环境
            - Dopamine Rootless (iOS 14-16.5)
            - RootHide Bootstrap (iOS 14-16.5)
            - palera1n Rootless (iOS 14-16.5)

            ## 安装包
            - `AxonNext_rootless.deb` - Rootless 版本
            - `AxonNext_roothide.deb` - Roothide 版本

            ## 功能特性
            - 四方向手势（上滑/下滑/左滑/右滑）
            - 长按菜单（打开应用/查看通知/清除/收藏/复制等）
            - 全中文设置界面
            - 黑白名单过滤
            - 自定义布局（图标大小/间距/每行数量/圆角）
            - 6种动画效果
            - 通知角标
            - 深色/浅色/毛玻璃/透明外观
          files: |
            release/*.deb
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
