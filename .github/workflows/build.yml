name: Build AxonNext

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  THEOS: /opt/theos

jobs:
  build:
    name: Build (${{ matrix.scheme }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scheme: [rootless, roothide]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential fakeroot dpkg-dev perl \
            rsync curl wget git unzip xz-utils lzma

      - name: Install ldid
        run: |
          curl -sL https://github.com/ProcursusTeam/ldid/releases/latest/download/ldid_linux_x86_64 -o /tmp/ldid
          sudo install -m755 /tmp/ldid /usr/local/bin/ldid

      - name: Install Theos with toolchain (rootless)
        if: matrix.scheme == 'rootless'
        run: |
          sudo mkdir -p /opt/theos
          sudo chown -R $USER /opt/theos
          # Clone Theos
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          # Install toolchain from sbingner/llvm-project
          mkdir -p /opt/theos/toolchain/linux/iphone
          curl -sL "https://github.com/sbingner/llvm-project/releases/download/v10.0.0-2/linux-ios-arm64e-clang-toolchain.tar.lzma" -o /tmp/toolchain.tar.lzma
          cd /tmp && lzma -d toolchain.tar.lzma && tar -xf toolchain.tar -C /opt/theos/toolchain/linux/iphone
          # Install ldid into toolchain bin
          cp /usr/local/bin/ldid /opt/theos/toolchain/linux/iphone/bin/ldid 2>/dev/null || true
          # Install SDK
          mkdir -p /opt/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git /tmp/sdks
          if [ -d "/tmp/sdks/iPhoneOS16.5.sdk" ]; then
            cp -r /tmp/sdks/iPhoneOS16.5.sdk /opt/theos/sdks/
          else
            curl -sL "https://github.com/theos/sdks/raw/master/iPhoneOS16.5.sdk.tar.xz" -o /tmp/sdk.tar.xz && \
            tar -xf /tmp/sdk.tar.xz -C /opt/theos/sdks/ || true
          fi
          # Fallback: try iPhoneOS14.5 SDK if 16.5 not found
          if [ ! -d "/opt/theos/sdks/iPhoneOS16.5.sdk" ]; then
            curl -sL "https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz" -o /tmp/sdk2.tar.xz && \
            tar -xf /tmp/sdk2.tar.xz -C /opt/theos/sdks/ || true
          fi
          echo "=== Theos tree ==="
          ls /opt/theos/toolchain/linux/iphone/bin/ | head -10
          echo "=== SDKs ==="
          ls /opt/theos/sdks/

      - name: Install Theos with toolchain (roothide)
        if: matrix.scheme == 'roothide'
        run: |
          sudo mkdir -p /opt/theos
          sudo chown -R $USER /opt/theos
          # Clone roothide Theos fork
          git clone --recursive https://github.com/roothide/Theos.git /opt/theos
          # Install toolchain from sbingner/llvm-project
          mkdir -p /opt/theos/toolchain/linux/iphone
          curl -sL "https://github.com/sbingner/llvm-project/releases/download/v10.0.0-2/linux-ios-arm64e-clang-toolchain.tar.lzma" -o /tmp/toolchain.tar.lzma
          cd /tmp && lzma -d toolchain.tar.lzma && tar -xf toolchain.tar -C /opt/theos/toolchain/linux/iphone
          # Install ldid into toolchain bin
          cp /usr/local/bin/ldid /opt/theos/toolchain/linux/iphone/bin/ldid 2>/dev/null || true
          # Install SDK
          mkdir -p /opt/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git /tmp/sdks
          if [ -d "/tmp/sdks/iPhoneOS16.5.sdk" ]; then
            cp -r /tmp/sdks/iPhoneOS16.5.sdk /opt/theos/sdks/
          else
            curl -sL "https://github.com/theos/sdks/raw/master/iPhoneOS16.5.sdk.tar.xz" -o /tmp/sdk.tar.xz && \
            tar -xf /tmp/sdk.tar.xz -C /opt/theos/sdks/ || true
          fi
          if [ ! -d "/opt/theos/sdks/iPhoneOS16.5.sdk" ]; then
            curl -sL "https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz" -o /tmp/sdk2.tar.xz && \
            tar -xf /tmp/sdk2.tar.xz -C /opt/theos/sdks/ || true
          fi
          echo "=== Theos tree ==="
          ls /opt/theos/toolchain/linux/iphone/bin/ | head -10
          echo "=== SDKs ==="
          ls /opt/theos/sdks/

      - name: Setup Theos environment
        run: |
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          echo "THEOS_PACKAGE_SCHEME=${{ matrix.scheme }}" >> $GITHUB_ENV

      - name: Build Tweak
        run: |
          cd ${{ github.workspace }}
          make clean || true
          make package THEOS_PACKAGE_SCHEME=${{ matrix.scheme }} FINALPACKAGE=1 2>&1 || {
            echo "=== Build failed, retrying with verbose ==="
            make package THEOS_PACKAGE_SCHEME=${{ matrix.scheme }} FINALPACKAGE=1 VERBOSE=1
          }

      - name: List built packages
        run: |
          ls -la packages/ 2>/dev/null || echo "No packages directory"
          find . -name "*.deb" -exec ls -la {} \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AxonNext-${{ matrix.scheme }}
          path: |
            packages/*.deb
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name "*.deb" -exec cp {} release/ \;
          # Rename debs
          for f in release/*.deb; do
            if echo "$f" | grep -q rootless; then
              cp "$f" release/AxonNext_rootless.deb
            elif echo "$f" | grep -q roothide; then
              cp "$f" release/AxonNext_roothide.deb
            fi
          done
          ls -la release/

      - name: Delete existing release if any
        run: |
          gh release delete v2.0 2>/dev/null || true
          git push --delete origin v2.0 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0
          name: AxonNext v2.0
          body: |
            # AxonNext v2.0

            ## 支持的越狱环境
            - Dopamine Rootless (iOS 14-16.5)
            - RootHide Bootstrap (iOS 14-16.5)
            - palera1n Rootless (iOS 14-16.5)

            ## 安装包
            - `AxonNext_rootless.deb` - Rootless 版本
            - `AxonNext_roothide.deb` - Roothide 版本

            ## 功能特性
            - 四方向手势（上滑/下滑/左滑/右滑）
            - 长按菜单（打开应用/查看通知/清除/收藏/复制等）
            - 全中文设置界面
            - 黑白名单过滤
            - 自定义布局（图标大小/间距/每行数量/圆角）
            - 6种动画效果
            - 通知角标
            - 深色/浅色/毛玻璃/透明外观
          files: |
            release/*.deb
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
